<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #ffffff;
      color: #1a1a2e;
      font-family: 'Cairo', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100%;
      -webkit-font-smoothing: antialiased;
    }
    body { padding: 16px 16px 40px; }
    .page-title {
      text-align: center;
      font-size: 17px;
      font-weight: 700;
      color: #1a1a2e;
      padding: 20px 0 24px;
      border-bottom: 1px solid #f0f0f0;
      margin-bottom: 24px;
    }
    .wpwl-form { color: #1a1a2e; font-family: 'Cairo', sans-serif; }
    .wpwl-form-card { background: transparent; border: none; padding: 0; margin: 0; }
    .wpwl-control {
      background-color: #F8F9FA;
      border: 1.5px solid #E5E7EB;
      border-radius: 10px;
      color: #1a1a2e;
      padding: 10px 12px;
      font-size: 16px;
      font-family: 'Cairo', sans-serif;
      height: 44px;
      direction: ltr;
      text-align: left;
      -webkit-appearance: none;
      transition: border-color 0.2s;
    }
    .wpwl-control:focus {
      border-color: #1a1a2e;
      outline: none;
      box-shadow: 0 0 0 2px rgba(26,26,46,0.1);
      background-color: #ffffff;
    }
    .wpwl-control::placeholder { color: #9CA3AF; }
    .wpwl-label {
      color: #374151;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Cairo', sans-serif;
      margin-bottom: 4px;
    }
    .wpwl-group { margin-bottom: 12px; }
    .wpwl-wrapper { padding: 0; }
    .wpwl-group-brand {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
      padding: 10px 12px;
      background-color: #F8F9FA;
      border-radius: 10px;
      border: 1.5px solid #E5E7EB;
    }
    .wpwl-group-brand .wpwl-label { display: none; }
    .wpwl-group-brand .wpwl-wrapper { width: 100%; }
    .wpwl-control-brand {
      background-color: transparent;
      border: none;
      font-size: 15px;
      font-weight: 600;
      color: #1a1a2e;
      height: auto;
      padding: 0;
      width: 100%;
    }
    .wpwl-brand img { height: 24px !important; width: auto !important; }
    .wpwl-button-pay {
      background: #1a1a2e;
      border: none;
      border-radius: 12px;
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Cairo', sans-serif;
      padding: 14px 24px;
      width: 100%;
      cursor: pointer;
      margin-top: 16px;
      -webkit-appearance: none;
      transition: opacity 0.2s;
    }
    .wpwl-button-pay:active { opacity: 0.85; }
    .wpwl-has-error .wpwl-control { border-color: #EF4444; }
    .wpwl-hint { color: #EF4444; font-size: 12px; font-family: 'Cairo', sans-serif; margin-top: 3px; }
    #loading {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 200px;
      gap: 12px;
    }
    #loading-spinner {
      width: 32px; height: 32px;
      border: 3px solid #E5E7EB;
      border-top: 3px solid #1a1a2e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    #loading-text { color: #6B7280; font-size: 14px; font-family: 'Cairo', sans-serif; }
    .secure-note {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 20px;
      padding: 10px 12px;
      background: #F9FAFB;
      border-radius: 8px;
      font-size: 12px;
      color: #9CA3AF;
      font-family: 'Cairo', sans-serif;
    }
    #error-box {
      display: none;
      padding: 20px;
      text-align: center;
      color: #EF4444;
      font-family: 'Cairo', sans-serif;
    }
  </style>
</head>
<body>
  <div class="page-title" id="page-title">الدفع الآمن</div>
  <div id="loading">
    <div id="loading-spinner"></div>
    <div id="loading-text">جاري تحميل نموذج الدفع...</div>
  </div>
  <div id="error-box"></div>
  <form class="paymentWidgets" id="payment-form" data-brands="VISA MASTER"></form>
  <div class="secure-note">
    🔒 <span id="secure-text">جميع المعاملات مشفرة وآمنة</span>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var checkoutId = params.get('checkoutId') || '';
      var lang = params.get('lang') || 'ar';
      var brands = params.get('brands') || 'VISA MASTER';
      var integrity = params.get('integrity') || '';
      var mode = params.get('mode') || 'live';

      var isAr = lang === 'ar';
      var dir = isAr ? 'rtl' : 'ltr';
      var baseUrl = mode === 'live'
        ? 'https://eu-prod.oppwa.com'
        : 'https://eu-test.oppwa.com';

      // Apply language/direction
      document.documentElement.setAttribute('dir', dir);
      document.documentElement.setAttribute('lang', lang);
      document.getElementById('page-title').textContent = isAr ? 'الدفع الآمن' : 'Secure Payment';
      document.getElementById('loading-text').textContent = isAr ? 'جاري تحميل نموذج الدفع...' : 'Loading payment form...';
      document.getElementById('secure-text').textContent = isAr ? 'جميع المعاملات مشفرة وآمنة' : 'All transactions are encrypted and secure';

      if (!checkoutId) {
        document.getElementById('loading').style.display = 'none';
        var errBox = document.getElementById('error-box');
        errBox.style.display = 'block';
        errBox.textContent = isAr ? 'خطأ: معرف الدفع مفقود' : 'Error: missing checkoutId';
        return;
      }

      // Set form attributes
      var form = document.getElementById('payment-form');
      form.setAttribute('data-brands', brands);
      form.setAttribute('action', 'foyabeauty://payment-result');

      // wpwlOptions must be set BEFORE the widget script loads
      window.wpwlOptions = {
        locale: lang,
        style: 'plain',
        brandDetection: true,
        brandDetectionType: 'binlist',
        spinner: { lines: 0 },
        onReady: function () {
          var el = document.getElementById('loading');
          if (el) el.style.display = 'none';
        }
      };

      // Dynamically inject the HyperPay widget script
      var script = document.createElement('script');
      script.src = baseUrl + '/v1/paymentWidgets.js?checkoutId=' + encodeURIComponent(checkoutId);
      if (integrity) {
        script.integrity = integrity;
        script.crossOrigin = 'anonymous';
      }
      script.onerror = function () {
        document.getElementById('loading').style.display = 'none';
        var errBox = document.getElementById('error-box');
        errBox.style.display = 'block';
        errBox.textContent = isAr ? 'فشل تحميل نموذج الدفع. يرجى المحاولة مرة أخرى.' : 'Failed to load payment form. Please try again.';
      };
      document.head.appendChild(script);
    })();
  </script>
</body>
</html>
